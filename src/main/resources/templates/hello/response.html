<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ResponseSample</title>
</head>
<body>
    <h1>HelloResponseDB</h1>

    <div th:if="${transactions != null and !#lists.isEmpty(transactions)}">
        <table border="1">
            <tr>
                <th>ID</th>
                <th>Amount</th>
                <th>Type</th>
                <th>Memo</th>
            </tr>
            <tr th:each="tx : ${transactions}">
                <td th:text="${tx['ID']}"></td>
                <td th:text="${tx['AMOUNT']}"></td>
                <td th:text="${tx['TYPE']}"></td>
                <td th:text="${tx['MEMO']}"></td>
            </tr>
        </table>
    </div>

    <p th:unless="${transactions != null and !#lists.isEmpty(transactions)}">
        該当データがありません。
    </p>
</body>
</html>

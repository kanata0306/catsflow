<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ResponseSample</title>
</head>
<body>
    <h1>HelloResponseDB</h1>
    <table>
        <tr>
            <th>ID</th>
            <td th:text="${employee.employeeId}"></td>
        </tr>
        <tr>
            <th>Name</th>
            <td th:text="${employee.employeeName}"></td>
        </tr>
        <tr>
            <th>Age</th>
            <td th:text="${employee.employeeAge}"></td>
        </tr>
    </table>
</body>
</html>
